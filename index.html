<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>試着室番号管理</title>
  <link rel="stylesheet" href="style.css?v=9001" />
</head>

<body>

  <!-- 店番入力（テンキー） -->
  <div id="storeInput">
    <h2>店番を入力してください</h2>
    <div id="storeDisplay">---</div>

    <div class="keypad">
      <button onclick="pressKey(1)">1</button>
      <button onclick="pressKey(2)">2</button>
      <button onclick="pressKey(3)">3</button>
      <button onclick="pressKey(4)">4</button>
      <button onclick="pressKey(5)">5</button>
      <button onclick="pressKey(6)">6</button>
      <button onclick="pressKey(7)">7</button>
      <button onclick="pressKey(8)">8</button>
      <button onclick="pressKey(9)">9</button>
      <button onclick="clearKey()">C</button>
      <button onclick="pressKey(0)">0</button>
      <button id="enterStoreButton" onclick="confirmStore()">決定</button>
    </div>
  </div>

  <!-- 性別選択 -->
  <div id="genderSelect" style="display:none;">
    <h2>性別を選択してください</h2>
    <button class="gender-button" onclick="selectGender('men')">メンズ</button>
    <button class="gender-button" onclick="selectGender('women')">レディース</button>
  </div>

  <!-- メイン画面 -->
  <div id="main" style="display:none;">
    <h2 id="title"></h2>

    <div class="info">
      現在の待機数：<span id="waitingCount">0</span>名
    </div>

    <h3>番号札</h3>
    <div class="number-buttons">
      <button data-num="1" onclick="addNumber(1)">1</button>
      <button data-num="2" onclick="addNumber(2)">2</button>
      <button data-num="3" onclick="addNumber(3)">3</button>
      <button data-num="4" onclick="addNumber(4)">4</button>
      <button data-num="5" onclick="addNumber(5)">5</button>
      <button data-num="6" onclick="addNumber(6)">6</button>
      <button data-num="7" onclick="addNumber(7)">7</button>
      <button data-num="8" onclick="addNumber(8)">8</button>
    </div>

    <h3>待機中</h3>
    <div id="waitingList"></div>

    <button id="resetButton" class="reset">全リセット</button>

    <!-- ★追加：戻るボタン -->
    <button id="backButton" class="back" onclick="goBack()">
      ← 戻る
    </button>

  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <!-- Firebase設定 -->
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAuLRxpzQ1tsjszhjgHiDZ8gRCbz9sy0BU",
      authDomain: "fittingroom2-51523.firebaseapp.com",
      databaseURL: "https://fittingroom2-51523-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "fittingroom2-51523",
      storageBucket: "fittingroom2-51523.firebasestorage.app",
      messagingSenderId: "204237803302",
      appId: "1:204237803302:web:3d1dd4e87f414fe0433be7"
    };

    firebase.initializeApp(firebaseConfig);

    // 匿名認証
    firebase.auth().signInAnonymously()
      .then(() => {
        console.log("匿名認証成功");
      })
      .catch((error) => {
        console.error("匿名認証失敗", error);
      });
  </script>

  <!-- メインスクリプト -->
  <script src="script.js?v=9001"></script>

</body>
</html>
