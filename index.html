<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>試着室管理</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 20px;
  }

  /* 性別ボタン */
  .gender-button {
    font-size: 32px;
    padding: 20px 40px;
    width: 80%;
    max-width: 300px;
    height: 80px;
    margin: 10px;
    border-radius: 12px;
    border: none;
    background-color: #4CAF50;
    color: white;
  }

  /* 店番テンキー */
  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    justify-content: center;
    margin-top: 20px;
  }

  .keypad button {
    font-size: 36px;
    width: 100px;
    height: 100px;
    border-radius: 12px;
    border: none;
    background-color: #2196F3;
    color: white;
  }

  /* 店番決定ボタン */
  #enterStoreButton {
    font-size: 28px;
    padding: 20px;
    width: 80%;
    max-width: 300px;
    height: 80px;
    margin-top: 20px;
    border-radius: 12px;
    border: none;
    background-color: #FF9800;
    color: white;
  }

  #storeNumberDisplay {
    font-size: 40px;
    margin: 20px 0;
  }
</style>
</head>

<body>

<h2>性別を選択</h2>
<button class="gender-button" onclick="selectGender('men')">メンズ</button>
<button class="gender-button" onclick="selectGender('women')">
